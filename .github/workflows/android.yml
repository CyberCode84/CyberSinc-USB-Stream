name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Cordova and Global Tools
        run: |
          npm install -g cordova
          npm install

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android Licenses
        run: yes | sdkmanager --licenses

      - name: Prepare Cordova Project
        run: |
          # Create symbolic link or move www if needed (though we already have it)
          # Cordova expects a platforms/ directory and plugins/ directory to be generated
          
          # Initialize cordova project structure if config.xml is in root
          # Usually config.xml being in root is fine for VoltBuilder but Cordova CLI might want a specific layout
          # However, let's proceed with current layout
          
          # Add the local plugin
          cordova plugin add ./native --link
          
          # Add Android platform
          cordova platform add android@13.0.0 --no-telemetry

      - name: Build Android APK
        run: cordova build android --release --no-telemetry

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CyberSinc-USB-Stream-APK
          path: '**/build/outputs/apk/**/*.apk'
