<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSinc // RECEIVER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans min-h-screen flex flex-col items-center justify-center p-8 overflow-hidden">
    
    <!-- Cinematic Background -->
    <div class="fixed inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-from)_0%,_transparent_100%)] from-cyan-950/20 pointer-events-none"></div>
    <div class="fixed inset-0 bg-[linear-gradient(rgba(18,18,18,0.3)_1px,transparent_1px),linear-gradient(90deg,rgba(18,18,18,0.3)_1px,transparent_1px)] bg-[size:60px_60px] pointer-events-none opacity-20"></div>

    <!-- Main Container -->
    <div id="main-ui" class="w-full max-w-4xl space-y-12 relative z-10 flex flex-col items-center text-center transition-all duration-700">
        
        <!-- Header -->
        <div class="space-y-4">
            <div class="inline-flex items-center gap-4 px-6 py-3 bg-cyan-500/10 rounded-3xl border border-cyan-500/30 shadow-[0_0_30px_-5px_rgba(34,211,238,0.2)]">
                <div class="w-3 h-3 rounded-full bg-cyan-400 animate-pulse"></div>
                <h1 class="text-3xl font-black italic tracking-[0.2em] uppercase text-cyan-400">CYBERSINC // RECEIVER</h1>
            </div>
            <p class="text-zinc-500 text-xs tracking-[0.5em] font-bold uppercase">Awaiting Transmission Bridge</p>
        </div>

        <!-- Connection Status Card -->
        <div class="w-full max-w-2xl bg-zinc-900/40 backdrop-blur-2xl border border-zinc-800/80 rounded-[3rem] p-10 flex flex-col gap-8 shadow-2xl relative">
            
            <!-- Status Label -->
            <div class="flex items-center justify-between w-full bg-zinc-950/80 p-4 rounded-full border border-white/5">
                <div class="flex items-center gap-4 pl-4">
                    <div id="status-dot" class="w-3 h-3 rounded-full ring-8 bg-zinc-700 ring-zinc-700/10"></div>
                    <span class="text-sm font-bold text-zinc-400 uppercase tracking-widest">Connection Status</span>
                </div>
                <span id="status-label" class="text-xs px-6 py-2 rounded-full font-black uppercase bg-zinc-800 text-zinc-500">OFFLINE</span>
            </div>

            <!-- Dashboard Stats -->
            <div class="grid grid-cols-3 gap-4">
                <div class="bg-zinc-950/60 rounded-[2rem] p-6 flex flex-col items-center gap-2 border border-white/5">
                    <span class="text-[10px] text-zinc-600 uppercase font-black tracking-tighter">Throughput</span>
                    <span id="stat-bitrate" class="text-xl font-black text-zinc-400">0.0 MB/s</span>
                </div>
                <div class="bg-zinc-950/60 rounded-[2rem] p-6 flex flex-col items-center gap-2 border border-white/5">
                    <span class="text-[10px] text-zinc-600 uppercase font-black tracking-tighter">Sync</span>
                    <span id="stat-fps" class="text-xl font-black text-zinc-400">0 FPS</span>
                </div>
                <div class="bg-zinc-950/60 rounded-[2rem] p-6 flex flex-col items-center gap-2 border border-white/5">
                    <span class="text-[10px] text-zinc-600 uppercase font-black tracking-tighter">Jitter</span>
                    <span id="stat-latency" class="text-xl font-black text-zinc-400">-- MS</span>
                </div>
            </div>

            <!-- Big Action Button -->
            <button id="btn-reception" class="group relative w-full h-24 bg-cyan-500 rounded-full flex items-center justify-center gap-4 transition-all duration-300 hover:bg-cyan-400 active:scale-[0.98] shadow-[0_10px_40px_-10px_rgba(34,211,238,0.4)] overflow-hidden">
                <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform duration-500"></div>
                <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" class="text-zinc-950 group-hover:scale-110 transition-transform"><path d="M5 3l14 9-14 9V3z"/></svg>
                <span id="btn-text" class="text-zinc-950 font-black text-xl tracking-[0.2em] uppercase">Iniciar Recepção</span>
            </button>
        </div>

        <!-- Tech Footer -->
        <div class="flex items-center gap-8 opacity-40">
            <div class="flex flex-col items-center gap-1">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Protocol</span>
                <span class="text-xs font-black">AOA 2.0 // H.264</span>
            </div>
            <div class="w-[1px] h-10 bg-zinc-800"></div>
            <div class="flex flex-col items-center gap-1">
                <span class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest">Renderer</span>
                <span class="text-xs font-black">HW DIRECT v4</span>
            </div>
        </div>
    </div>

    <!-- Video Canvas (Hidden by default) -->
    <div id="video-stage" class="fixed inset-0 bg-black z-50 hidden flex items-center justify-center">
        <!-- In a real implementation, a Native SurfaceView would be here -->
        <div class="absolute top-8 left-8 z-10 flex items-center gap-4 bg-black/60 backdrop-blur-md px-6 py-3 rounded-full border border-white/10">
             <div class="w-2 h-2 rounded-full bg-red-600 animate-pulse"></div>
             <span class="text-[10px] font-black tracking-widest uppercase text-white/80">LIVE // MIRRORING 60FPS</span>
             <button id="btn-exit-fullscreen" class="ml-4 text-white/40 hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
             </button>
        </div>
        <div class="w-full h-full flex items-center justify-center">
             <p class="text-cyan-500/20 font-black italic text-4xl uppercase tracking-[1em] animate-pulse">Stream Surface Active</p>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
