<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberSinc USB Stream</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/index.css">
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden">
    
    <!-- Background Grid -->
    <div class="fixed inset-0 bg-[linear-gradient(rgba(18,18,18,0.3)_1px,transparent_1px),linear-gradient(90deg,rgba(18,18,18,0.3)_1px,transparent_1px)] bg-[size:40px_40px] pointer-events-none opacity-20"></div>

    <div class="w-full max-w-md space-y-10 relative z-10 flex flex-col items-center text-center">
        
        <!-- Branding -->
        <div class="space-y-1">
            <div class="flex items-center justify-center gap-2 mb-2 p-3 bg-cyan-500/10 rounded-2xl border border-cyan-500/20">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="text-cyan-400"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
                <h1 class="text-xl font-black italic tracking-tighter uppercase">CyberSinc USB Stream</h1>
            </div>
            <p class="text-zinc-500 text-[10px] tracking-[0.3em] font-bold uppercase">Pro Gaming Mode Active</p>
        </div>

        <!-- Transmission Button Area -->
        <div class="relative">
            <div id="status-rings" class="hidden">
                 <div class="absolute inset-0 border border-cyan-500/40 rounded-full animate-ping"></div>
            </div>

            <button id="btn-toggle" class="relative z-10 w-60 h-60 rounded-full flex flex-col items-center justify-center gap-3 transition-all duration-300 bg-zinc-900 border-b-4 border-cyan-500 text-cyan-400 active:scale-95 shadow-[0_0_50px_-12px_rgba(0,0,0,0.5)]">
                <div id="btn-icon" class="p-5 rounded-full bg-cyan-500/10 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
                </div>
                <span id="btn-text" class="font-black text-sm tracking-widest uppercase">INICIAR ESPELHAMENTO</span>
            </button>
        </div>

        <!-- Dashboard -->
        <div class="w-full bg-zinc-900/30 backdrop-blur-xl border border-zinc-800/50 rounded-[2.5rem] p-6 flex flex-col gap-5">
            <div class="flex items-center justify-between bg-zinc-950/50 p-2 pl-4 rounded-full border border-white/5">
                <div class="flex items-center gap-3">
                    <div id="status-dot" class="w-2 h-2 rounded-full ring-4 bg-zinc-700 ring-zinc-700/10"></div>
                    <span class="text-[11px] font-bold text-zinc-500 uppercase tracking-wider">Engine Status</span>
                </div>
                <span id="status-label" class="text-[10px] px-4 py-1.5 rounded-full font-black uppercase bg-zinc-800 text-zinc-400">READY</span>
            </div>

            <div class="grid grid-cols-2 gap-3">
                <div class="bg-zinc-950/50 rounded-3xl p-4 flex flex-col items-center gap-1 border border-white/5">
                    <span class="text-[9px] text-zinc-600 uppercase font-bold">Latency</span>
                    <span class="text-sm font-black text-cyan-400 tracking-tight">0 MS</span>
                </div>
                <div class="bg-zinc-950/50 rounded-3xl p-4 flex flex-col items-center gap-1 border border-white/5">
                    <span class="text-[9px] text-zinc-600 uppercase font-bold">Frame Rate</span>
                    <span class="text-sm font-black text-cyan-400 tracking-tight">60 FPS</span>
                </div>
            </div>

            <div id="message-container" class="flex items-center gap-3 bg-cyan-500/5 border border-cyan-500/10 p-4 rounded-3xl text-zinc-400">
                <div class="text-left">
                    <p class="text-[10px] font-bold uppercase text-cyan-400 mb-0.5">Plug & Play Optimization</p>
                    <p id="system-msg" class="text-[11px] font-medium leading-none opacity-60 italic">Aguardando conexão AOA no receptor...</p>
                </div>
            </div>
        </div>

        <div class="pt-4">
            <div class="px-4 py-1.5 bg-zinc-900 rounded-full border border-zinc-800 flex items-center gap-2">
                <span class="w-1.5 h-1.5 rounded-full bg-cyan-500 animate-pulse"></span>
                <span class="text-[9px] font-black text-zinc-500 uppercase tracking-[0.2em]">Zero Latency Protocol v1.4</span>
            </div>
        </div>
    </div>

    <script src="cordova.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
